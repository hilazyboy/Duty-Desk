<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Duty Desk</title>
<style>
  :root{
    --ink:#14181C;
    --ink-2:#1D2329;
    --paper:#EDEAE1;
    --paper-2:#E2DED2;
    --amber:#F2B705;
    --amber-dim:#B08A0A;
    --steel:#4A6572;
    --alert:#C1442E;
    --line: rgba(20,24,28,0.16);
    --paper-text:#1D2329;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(242,183,5,0.06), transparent 40%),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:18px 14px 40px;
  }

  /* Header */
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:6px 4px 16px;
    border-bottom:1px solid rgba(237,234,225,0.15);
    margin-bottom:18px;
  }
  .brand{
    font-family:'Arial Narrow',Oswald,'Segoe UI',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--paper);
  }
  .brand span{color:var(--amber);}
  .badge-id{
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:11px;
    color:var(--steel);
    letter-spacing:0.5px;
  }

  /* Tabs styled like a clipboard clip */
  .tabs{
    display:flex;
    gap:2px;
    background:var(--ink-2);
    border-radius:10px 10px 0 0;
    padding:5px 5px 0;
    position:relative;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:12px 4px 11px;
    font-family:'Arial Narrow',Oswald,'Segoe UI',sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.4px;
    text-transform:uppercase;
    color:rgba(237,234,225,0.5);
    background:transparent;
    border:none;
    border-radius:8px 8px 0 0;
    cursor:pointer;
    transition:color .15s ease, background .15s ease;
  }
  .tab.active{
    color:var(--ink);
    background:var(--paper);
  }
  .tab:not(.active):hover{color:var(--paper);}

  /* Paper pad */
  .pad{
    background:var(--paper);
    color:var(--paper-text);
    border-radius:0 0 12px 12px;
    padding:22px 18px 20px;
    position:relative;
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
  }
  .pad::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:repeating-linear-gradient(90deg, var(--amber) 0 10px, transparent 10px 16px);
    opacity:0.9;
  }

  .field-group{margin-bottom:16px;}
  .field-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:var(--steel);
    margin-bottom:6px;
  }
  .field-label .req{color:var(--alert); font-size:14px; line-height:1;}
  input[type=text], textarea, select{
    width:100%;
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 11px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;
    font-size:14.5px;
    color:var(--paper-text);
    resize:vertical;
    outline:none;
  }
  input[type=text]:focus, textarea:focus, select:focus{
    border-color:var(--amber-dim);
    box-shadow:0 0 0 3px rgba(242,183,5,0.18);
  }
  textarea{min-height:76px; line-height:1.45;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .chip-select{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    padding:7px 13px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fff;
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:12px;
    font-weight:500;
    cursor:pointer;
    color:var(--paper-text);
    user-select:none;
  }
  .chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--amber);
  }

  .generate-btn{
    width:100%;
    margin-top:6px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--ink);
    color:var(--amber);
    font-family:'Arial Narrow',Oswald,'Segoe UI',sans-serif;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:0.6px;
    text-transform:uppercase;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    transition:transform .1s ease, opacity .15s ease;
  }
  .generate-btn:active{transform:scale(0.98);}
  .generate-btn:disabled{opacity:0.55; cursor:default;}
  .spinner{
    width:14px;height:14px;
    border:2px solid rgba(242,183,5,0.3);
    border-top-color:var(--amber);
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .generate-btn.loading .spinner{display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .error-msg{
    margin-top:10px;
    font-size:12.5px;
    color:var(--alert);
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
  }

  /* Output — stamped log entry / carbon copy stub */
  .output-wrap{
    margin-top:22px;
    display:none;
  }
  .output-wrap.show{display:block;}
  .stub-row{
    display:flex;
    align-items:stretch;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 26px rgba(0,0,0,0.3);
  }
  .stub{
    width:30px;
    background:var(--steel);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .stub span{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:10px;
    letter-spacing:2px;
    color:rgba(237,234,225,0.85);
    text-transform:uppercase;
  }
  .output-body{
    flex:1;
    background:#fff;
    padding:18px 16px 16px;
    border-left:1px dashed rgba(20,24,28,0.25);
  }
  .output-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    padding-bottom:9px;
    border-bottom:1px solid var(--line);
  }
  .output-meta .ts{
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:10.5px;
    color:var(--steel);
    letter-spacing:0.4px;
  }
  .copy-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:5px;
    padding:5px 10px;
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:var(--paper-text);
    cursor:pointer;
  }
  .copy-btn:hover{background:var(--paper-2);}
  .copy-btn.copied{color:#1a7a3c; border-color:#1a7a3c;}
  .output-text{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;
    font-size:14.5px;
    line-height:1.6;
    color:var(--paper-text);
    white-space:pre-wrap;
  }

  .footnote{
    text-align:center;
    font-family:ui-monospace,'IBM Plex Mono','SFMono-Regular','Consolas',monospace;
    font-size:10.5px;
    color:rgba(237,234,225,0.35);
    margin-top:22px;
    letter-spacing:0.3px;
  }

  @media (prefers-reduced-motion:reduce){
    .spinner{animation:none;}
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="brand">DUTY <span>DESK</span></div>
    <div class="badge-id">FIELD REPORT ASSIST</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="patrol">Patrol Log</button>
    <button class="tab" data-tab="incident">Incident</button>
    <button class="tab" data-tab="whatsapp">WhatsApp</button>
  </div>

  <div class="pad">

    <!-- PATROL FORM -->
    <div class="form-panel" id="panel-patrol">
      <div class="field-group">
        <div class="field-label"><span class="req">•</span>Zone / Floor (exact)</div>
        <input type="text" id="p-location" placeholder="e.g. Zone A & Zone B, 3rd Floor (Burjeel Eye Institute)">
      </div>
      <div class="field-group">
        <div class="field-label"><span class="req">•</span>Issue observed</div>
        <textarea id="p-observation" placeholder="e.g. Two ceiling-mounted console lights are not functioning (lights are off)"></textarea>
      </div>
      <button class="generate-btn" data-mode="patrol"><span class="spinner"></span><span class="btn-label">Generate Line</span></button>
    </div>

    <!-- INCIDENT / PATIENT FORM -->
    <div class="form-panel" id="panel-incident" style="display:none;">
      <div class="field-group">
        <div class="field-label"><span class="req">•</span>Who was involved</div>
        <input type="text" id="i-who" placeholder="e.g. Visitor, John T.">
      </div>
      <div class="row2">
        <div class="field-group">
          <div class="field-label">Date</div>
          <input type="text" id="i-date" placeholder="today">
        </div>
        <div class="field-group">
          <div class="field-label">Time</div>
          <input type="text" id="i-time" placeholder="now">
        </div>
      </div>
      <div class="field-group">
        <div class="field-label"><span class="req">•</span>What happened</div>
        <textarea id="i-what" placeholder="Describe what occurred, in order"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">Injuries / condition (if any)</div>
        <input type="text" id="i-injury" placeholder="e.g. Minor cut to left hand, none / not applicable">
      </div>
      <div class="field-group">
        <div class="field-label">Action taken</div>
        <input type="text" id="i-action" placeholder="e.g. First aid applied, supervisor notified">
      </div>
      <button class="generate-btn" data-mode="incident"><span class="spinner"></span><span class="btn-label">Generate Report</span></button>
    </div>

    <!-- WHATSAPP FORM -->
    <div class="form-panel" id="panel-whatsapp" style="display:none;">
      <div class="field-group">
        <div class="field-label">Message you received (optional)</div>
        <textarea id="w-incoming" placeholder="Paste what they sent you"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label"><span class="req">•</span>What you want to say</div>
        <textarea id="w-intent" placeholder="e.g. tell them I'll be 10 min late to shift handover"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">Tone</div>
        <div class="chip-select" id="w-tone">
          <div class="chip active" data-val="Professional">Professional</div>
          <div class="chip" data-val="Friendly">Friendly</div>
          <div class="chip" data-val="Firm">Firm</div>
        </div>
      </div>
      <button class="generate-btn" data-mode="whatsapp"><span class="spinner"></span><span class="btn-label">Draft Reply</span></button>
    </div>

    <div class="error-msg" id="error-msg" style="display:none;"></div>

    <div class="output-wrap" id="output-wrap">
      <div class="stub-row">
        <div class="stub"><span id="stub-label">DUTY LOG</span></div>
        <div class="output-body">
          <div class="output-meta">
            <span class="ts" id="output-ts"></span>
            <button class="copy-btn" id="copy-btn">Copy</button>
          </div>
          <div class="output-text" id="output-text"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="footnote">OFFLINE DRAFT — REVIEW BEFORE FILING</div>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
const panels = { patrol: document.getElementById('panel-patrol'), incident: document.getElementById('panel-incident'), whatsapp: document.getElementById('panel-whatsapp') };
let currentTab = 'patrol';

tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentTab = t.dataset.tab;
  Object.keys(panels).forEach(k => panels[k].style.display = (k === currentTab ? 'block' : 'none'));
  document.getElementById('output-wrap').classList.remove('show');
  document.getElementById('error-msg').style.display = 'none';
}));

// chip selectors
document.querySelectorAll('.chip-select').forEach(group => {
  group.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});

function getActiveChip(groupId){
  const g = document.getElementById(groupId);
  const active = g.querySelector('.chip.active');
  return active ? active.dataset.val : '';
}

// ---- Fully offline generators ----
// These build the same report formats locally in the browser,
// with no network request of any kind.

function generatePatrol(){
  const location = document.getElementById('p-location').value.trim();
  const observation = document.getElementById('p-observation').value.trim();
  if (!location || !observation) return { error: 'Add a location and the issue observed.' };

  let boldPart = location;
  let trailing = '';
  const parenMatch = location.match(/^(.*?)(\s*\([^)]*\))\s*$/);
  if (parenMatch){
    boldPart = parenMatch[1].trim();
    trailing = parenMatch[2].trim();
  }
  let obs = observation;
  obs = obs.charAt(0).toUpperCase() + obs.slice(1);
  if (!/[.!?]$/.test(obs)) obs += '.';

  const line = `**${boldPart}**${trailing ? ' ' + trailing : ''}: ${obs}`;
  return { text: line };
}

function generateIncident(){
  const who = document.getElementById('i-who').value.trim();
  const date = document.getElementById('i-date').value.trim() || 'today';
  const time = document.getElementById('i-time').value.trim() || 'now';
  const what = document.getElementById('i-what').value.trim();
  const injury = document.getElementById('i-injury').value.trim() || 'None reported';
  const action = document.getElementById('i-action').value.trim() || 'Not specified';
  if (!who || !what) return { error: 'Add who was involved and what happened.' };

  let desc = what.charAt(0).toUpperCase() + what.slice(1);
  if (!/[.!?]$/.test(desc)) desc += '.';

  const report =
`INCIDENT REPORT

Date: ${date}
Time: ${time}
Person(s) Involved: ${who}
Description of Incident: ${desc}
Injuries/Condition: ${injury}
Action Taken: ${action}
Follow-up Required: To be assessed by supervisor / relevant department
Officer Signature: _______________________`;

  return { text: report };
}

function generateWhatsapp(){
  const incoming = document.getElementById('w-incoming').value.trim();
  const intent = document.getElementById('w-intent').value.trim();
  const tone = getActiveChip('w-tone');
  if (!intent) return { error: "Add what you want to say." };

  let body = intent.trim();
  body = body.charAt(0).toUpperCase() + body.slice(1);
  if (!/[.!?]$/.test(body)) body += '.';

  let opener = '';
  let closer = '';
  if (tone === 'Professional'){
    opener = incoming ? 'Noted, thank you. ' : '';
    closer = '';
  } else if (tone === 'Friendly'){
    opener = incoming ? 'Hey, thanks for the heads up! ' : 'Hey! ';
    closer = ' Thanks!';
  } else if (tone === 'Firm'){
    opener = incoming ? 'Understood. ' : '';
    closer = ' Please confirm.';
  }

  const message = `${opener}${body}${closer}`;
  // Collapse repeated spaces/tabs only — keep line breaks the user typed intact.
  return { text: message.replace(/[ \t]+/g, ' ').trim() };
}

function buildPrompt(mode){
  if (mode === 'patrol') return generatePatrol();
  if (mode === 'incident') return generateIncident();
  if (mode === 'whatsapp') return generateWhatsapp();
}

document.querySelectorAll('.generate-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const mode = btn.dataset.mode;
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';
    const built = buildPrompt(mode);
    if (built.error){
      errorEl.textContent = built.error;
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');
    document.getElementById('output-wrap').classList.remove('show');

    // Small artificial delay so the UI feedback (spinner) still feels responsive,
    // even though generation is instant and fully offline / local.
    try {
      await new Promise(res => setTimeout(res, 150));

      const text = (built.text || '').trim();
      if (!text) throw new Error('Nothing generated');

      const html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      document.getElementById('output-text').innerHTML = html;
      document.getElementById('stub-label').textContent = mode === 'whatsapp' ? 'REPLY' : 'DUTY LOG';
      const now = new Date();
      document.getElementById('output-ts').textContent = 'Generated ' + now.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
      document.getElementById('output-wrap').classList.add('show');
      document.getElementById('output-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (err) {
      errorEl.textContent = "Couldn't generate: " + (err.message || "please check the fields and try again.");
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('output-text').innerText;
  const btn = document.getElementById('copy-btn');
  const showCopied = () => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text, showCopied));
  } else {
    fallbackCopy(text, showCopied);
  }
});

function fallbackCopy(text, onSuccess){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (e) {
    document.getElementById('error-msg').textContent = "Couldn't copy — select and copy the text manually.";
    document.getElementById('error-msg').style.display = 'block';
  }
  document.body.removeChild(ta);
}
</script>
</body>
</html>
